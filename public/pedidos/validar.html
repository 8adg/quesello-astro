<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Queselló - Estado de Pedido</title>
    <!-- TIPOGRAFÍA INTER -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #FF5E5E;
            --success: #38A169;
            --mint: #D1FAE5;
            --dark: #1A202C;
            --gray: #718096;
            --bg-page: #EDE8D3;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-page);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px 20px 40px 20px;
            box-sizing: border-box;
            color: var(--dark);
            -webkit-tap-highlight-color: transparent;
        }

        /* NAVBAR SUPERIOR */
        .top-navbar {
            width: 100%;
            max-width: 400px;
            display: flex;
            justify-content: flex-end;
            padding: 10px 0;
            margin-bottom: 5px;
        }

        .admin-trigger {
            cursor: pointer;
            color: #4A5568;
            padding: 5px;
            transition: transform 0.2s;
        }

        .admin-trigger:active {
            transform: scale(0.9);
        }

        /* HEADER */
        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        .header svg {
            width: 160px;
            height: auto;
            margin-bottom: 12px;
        }

        .header-title {
            color: #FF5E5E;
            font-size: 18px;
            font-weight: 500;
        }

        /* CARD PRINCIPAL */
        .card {
            background: white;
            padding: 35px 25px;
            border-radius: 27px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-sizing: border-box;
        }

        .card h1 {
            font-size: 24px;
            color: var(--dark);
            margin: 0 0 10px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-weight: 800;
        }

        .status-pill {
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 800;
            display: inline-block;
            margin-bottom: 25px;
            text-transform: uppercase;
            background: #FFEDD5;
            color: #9A3412;
        }

        .status-pill.pendiente_de_entrega {
            background: #FEF3C7;
            color: #92400E;
        }

        .status-pill.en_proceso {
            background: #DBEAFE;
            color: #1E40AF;
        }

        .status-pill.entregado {
            background: #D1FAE5;
            color: #065F46;
        }

        /* INFO BOX (AZULADO SEGUN UI) */
        .info-box {
            text-align: left;
            background: #F1F5F9;
            padding: 25px;
            border-radius: 24px;
            margin-bottom: 25px;
        }

        .info-item {
            margin-bottom: 15px;
        }

        .info-item:last-child {
            margin-bottom: 0;
        }

        .info-label {
            color: #94A3B8;
            font-size: 13px;
            font-weight: 400;
            margin-bottom: 4px;
        }

        .info-value {
            color: #1E293B;
            font-size: 17px;
            font-weight: 800;
        }

        .info-value.total {
            color: #FF5E5E;
            font-size: 24px;
            margin-top: 5px;
            display: block;
        }

        /* RETIRO BOX (VERDE) */
        .box-retiro {
            background: #D1FAE5;
            color: #065F46;
            padding: 20px;
            border-radius: 18px;
            font-weight: 600;
            font-size: 15px;
            border: 2px solid #afefd8;
            text-align: center;
        }



        .box-retiro span {
            font-size: 24px;
            font-weight: 800;
            display: block;
            margin-top: 5px;
        }

        /* BOTONES DE ACCION */
        .footer-btns {
            width: 100%;
            max-width: 400px;
            margin-top: 30px;
            text-align: center;
        }

        .btn-container {
            margin-bottom: 35px;
        }

        .action-btn {
            width: 100%;
            max-width: 220px;
            padding: 18px;
            border: none;
            border-radius: 18px;
            background: #FF5E5E;
            color: white;
            font-size: 20px;
            font-weight: 400;
            cursor: pointer;
            display: inline-block;
            text-decoration: none;
            transition: transform 0.2s;
        }

        .sub-text {
            color: #4A5568;
            font-size: 16px;
            margin-top: 15px;
            line-height: 1.4;
            padding: 0 10px;
        }

        /* ADMIN DRAWER (BOTTOM SHEET) */
        #drawer-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            display: none;
            backdrop-filter: blur(4px);
        }

        #admin-drawer {
            position: fixed;
            bottom: -100%;
            left: 0;
            width: 100%;
            background: white;
            z-index: 1001;
            border-radius: 50px 50px 0 0;
            padding: 45px 30px 60px 30px;
            box-sizing: border-box;
            transition: bottom 0.4s cubic-bezier(0.17, 0.84, 0.44, 1);
            text-align: center;
            box-shadow: 0 -15px 40px rgba(0, 0, 0, 0.15);
        }

        #admin-drawer.open {
            bottom: 0;
        }

        .drawer-handle {
            width: 50px;
            height: 6px;
            background: #E2E8F0;
            border-radius: 10px;
            margin: -25px auto 40px auto;
        }

        .drawer-icon {
            display: flex;
            justify-content: flex-start;
            margin-bottom: 15px;
            color: #FF5E5E;
            margin-left: 29px;
        }

        .drawer-title {
            font-size: 24px;
            font-weight: 800;
            color: #FF5E5E;
            margin-bottom: 30px;
        }

        input {
            width: 100%;
            padding: 20px;
            border: 2px solid #EDF2F7;
            border-radius: 20px;
            font-size: 18px;
            text-align: center;
            margin-bottom: 25px;
            box-sizing: border-box;
            outline: none;
            background: #F8FAFC;
            font-weight: 500;
        }

        input:focus {
            border-color: #FF5E5E;
            background: white;
        }

        .btn-confirm {
            width: 100%;
            padding: 20px;
            background: #FF5E5E;
            color: white;
            border-radius: 20px;
            font-size: 18px;
            font-weight: 500;
            border: none;
            cursor: pointer;

        }

        #loading {
            font-weight: 700;
            color: #718096;
            margin-top: 100px;
            font-size: 18px;
        }
    </style>
</head>

    <div id="admin-drawer">

        <div class="drawer-icon">
            <svg width="42" height="49" viewBox="0 0 42 49" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path
                    d="M18.6667 30.3333V35C14.9536 35 11.3927 36.475 8.76717 39.1005C6.14166 41.726 4.66667 45.287 4.66667 49H0C0 44.0493 1.96666 39.3013 5.46734 35.8007C8.96802 32.3 13.716 30.3333 18.6667 30.3333ZM18.6667 28C10.9317 28 4.66667 21.735 4.66667 14C4.66667 6.265 10.9317 0 18.6667 0C26.4017 0 32.6667 6.265 32.6667 14C32.6667 21.735 26.4017 28 18.6667 28ZM18.6667 23.3333C23.8233 23.3333 28 19.1567 28 14C28 8.84333 23.8233 4.66667 18.6667 4.66667C13.51 4.66667 9.33333 8.84333 9.33333 14C9.33333 19.1567 13.51 23.3333 18.6667 23.3333ZM39.6667 37.3333H42V49H23.3333V37.3333H25.6667V35C25.6667 33.1435 26.4042 31.363 27.7169 30.0503C29.0297 28.7375 30.8102 28 32.6667 28C34.5232 28 36.3037 28.7375 37.6164 30.0503C38.9292 31.363 39.6667 33.1435 39.6667 35V37.3333ZM35 37.3333V35C35 34.3812 34.7542 33.7877 34.3166 33.3501C33.879 32.9125 33.2855 32.6667 32.6667 32.6667C32.0478 32.6667 31.4543 32.9125 31.0168 33.3501C30.5792 33.7877 30.3333 34.3812 30.3333 35V37.3333H35Z"

        <input type="password" id="pin-input" placeholder="Ingresar PIN de Seguridad" maxlength="4" inputmode="numeric">
        <button class="btn-confirm" id="btn-entregar" onclick="confirmarEntrega()">CONFIRMAR ENTREGA</button>
    </div>

    <script>
        const SUPABASE_URL = "https://yihizwspxnxlfowvitoe.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlpaGl6d3NweG54bGZvd3ZpdG9lIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3MjkwNDU5MywiZXhwIjoyMDg4NDgwNTkzfQ.DFeL-VwIMCuY92_yev5xp3kVwS5g7SUsLfRfNWeH0gs";

        const { createClient } = supabase;
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_KEY);

        let correctPin = "1234";
        let attempts = 0;

        async function fetchPin() {
            try {
                const { data } = await supabaseClient.from('ajustes').select('valor').eq('id', 'pin_validacion').single();
                if (data) correctPin = data.valor;
            } catch (e) { console.error("Error fetching PIN", e); }
        }

        const urlParams = new URLSearchParams(window.location.search);
        const pid = urlParams.get('id');
        const tk = urlParams.get('tk');

        function toggleDrawer(open) {
            const drawer = document.getElementById('admin-drawer');
            const overlay = document.getElementById('drawer-overlay');
            if (open) {
                drawer.classList.add('open');
                overlay.style.display = 'block';
            } else {
                drawer.classList.remove('open');
                overlay.style.display = 'none';
            }
        }

        function formatLabel(val) {
            if (!val) return "Sin fecha";
            const d = new Date(val);
            if (isNaN(d.getTime())) return val;
            return `${d.getDate().toString().padStart(2, '0')}-${(d.getMonth() + 1).toString().padStart(2, '0')}-${d.getFullYear()} ${d.getHours().toString().padStart(2, '0')}:${d.getMinutes().toString().padStart(2, '0')}`;
        }

        async function cargarDatos() {
            if (!pid || !tk) {
                document.getElementById('loading').innerHTML = "❌ Enlace inválido.";
                return;
            }

            const { data, error } = await supabaseClient
                .from('presupuestos')
                .select('*')
                .eq('id', pid)
                .eq('token', tk)
                .single();

            if (error || !data) {
                document.getElementById('loading').innerHTML = "❌ No se encontró el pedido.";
                return;
            }

            document.getElementById('loading').style.display = 'none';
            document.getElementById('app-content').style.display = 'flex';

            document.getElementById('txt-numero').innerText = data.numero;
            document.getElementById('txt-cliente').innerText = data.cliente;

            if (data.pagado) {
                document.getElementById('txt-total').innerText = "$ 0,00";
                document.getElementById('lbl-total').innerText = "PAGADO: Total a pagar";
            } else {
                document.getElementById('txt-total').innerText = `$ ${data.total.toLocaleString('es-AR')}`;
            }

            actualizarPill(data.estado);

            if (data.retiro_sugerido && data.estado !== 'ENTREGADO') {
                document.getElementById('box-retiro').style.display = 'block';
                document.getElementById('txt-retiro').innerText = formatLabel(data.retiro_sugerido);
            }

            if (data.estado === 'ENTREGADO') {
                mostrarEntregado(data.entregado_at);
            }
        }

        function actualizarPill(estado) {
            const pill = document.getElementById('status-pill');
            const textMap = {
                'EN PROCESO': 'ESTAMOS PREPARANDO TU PEDIDO',
                'PENDIENTE DE ENTREGA': '¡LISTO PARA RETIRAR!',
                'ENTREGADO': 'EL PAQUETE FUE ENTREGADO'
            };

            pill.innerText = textMap[estado] || estado;

            pill.className = 'status-pill';
            if (estado === 'EN PROCESO') pill.style.background = '#DBEAFE';
            if (estado === 'EN PROCESO') pill.style.color = '#1E40AF';
            if (estado === 'PENDIENTE DE ENTREGA') pill.style.background = '#FEF3C7';
            if (estado === 'PENDIENTE DE ENTREGA') pill.style.color = '#92400E';
            if (estado === 'ENTREGADO') pill.style.background = '#D1FAE5';
            if (estado === 'ENTREGADO') pill.style.color = '#065F46';
        }

        function mostrarEntregado(fecha) {
            document.getElementById('msg-ok').style.display = 'block';
            const dateStr = formatLabel(fecha);
            document.getElementById('msg-delivery-txt').innerText = "Este pedido ya fue entregado el " + dateStr;
            document.querySelector('.admin-trigger').style.display = 'none';
        }

        async function confirmarEntrega() {
            const pinTyping = document.getElementById('pin-input').value;

            if (pinTyping !== correctPin) {
                attempts++;
                alert(`PIN Incorrecto. Intento ${attempts} de 2.`);
                if (attempts >= 2) {
                    toggleDrawer(false);
                    alert("Se han agotado los intentos.");
                }
                return;
            }

            const btn = document.getElementById('btn-entregar');
            btn.disabled = true;
            btn.innerText = "Procesando...";

            const now = new Date().toISOString();
            const { error } = await supabaseClient
                .from('presupuestos')
                .update({
                    estado: 'ENTREGADO',
                    entregado_at: now
                })
                .eq('id', pid);

            if (error) {
                alert("Error al actualizar: " + error.message);
                btn.disabled = false;
                btn.innerText = "CONFIRMAR ENTREGA";
            } else {
                actualizarPill('ENTREGADO');
                mostrarEntregado(now);
                toggleDrawer(false);
            }
        }

        fetchPin().then(() => cargarDatos());
    </script>
